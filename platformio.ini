; ============================================================================
;  ESP32-S3-Touch-LCD-1.28  -  3D Printer Status Monitor (Klipper / Bambu Lab)
; ============================================================================
;  Board: Waveshare ESP32-S3-Touch-LCD-1.28
;    - ESP32-S3R2 (2 MB QSPI PSRAM)
;    - 1.28" round LCD, 240x240, GC9A01 driver (SPI)
;    - CST816S capacitive touch (I2C)
;
;  NOTE on flash size: most units ship with 16 MB flash. The partition table
;  below only uses the first 4 MB, so it works on 4 MB and 16 MB units alike.
;  If your build fails with a flash-size mismatch, set board_upload.flash_size
;  to match your unit.
; ============================================================================

[env:esp32-s3-touch-lcd-128]
platform  = espressif32@^6.9.0
board     = esp32-s3-devkitc-1
framework = arduino

; --- Flash / PSRAM -----------------------------------------------------------
board_build.flash_mode          = qio
board_build.arduino.memory_type = qio_qspi      ; ESP32-S3R2 -> QSPI PSRAM
board_build.partitions          = partitions.csv

; --- Build flags -------------------------------------------------------------
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=0   ; USB-C is wired via the CH343 UART bridge, not native USB -> Serial = UART0
    -D BOARD_HAS_PSRAM
    -D LV_CONF_INCLUDE_SIMPLE
    -D LV_LVGL_H_INCLUDE_SIMPLE
    -D LGFX_USE_V1
    -I include

; --- Build version injection -------------------------------------------------
extra_scripts = pre:scripts/version.py

; --- Libraries ---------------------------------------------------------------
lib_deps =
    lovyan03/LovyanGFX@^1.1.16
    lvgl/lvgl@^8.4.0
    bblanchon/ArduinoJson@^7.2.0
    knolleary/PubSubClient@^2.8
    mathieucarbou/ESPAsyncWebServer@^3.3.0
    mathieucarbou/AsyncTCP@^3.2.0

; --- Serial monitor / upload -------------------------------------------------
monitor_speed  = 115200
monitor_filters = esp32_exception_decoder, time
upload_speed   = 921600

; ============================================================================
;  OTA upload over WiFi (ArduinoOTA / espota). Flash with:
;    pio run -e esp32-s3-touch-lcd-128-ota -t upload
;  Requirements:
;   - device already runs firmware with OTA enabled (first flash is USB);
;   - an "Update / OTA password" is set in the web UI (Settings -> Security);
;   - the --auth below MUST equal that password (edit it to match).
;  Note: espota uses a device->host reverse TCP connection; if your host firewall
;  blocks it (or you're across subnets), use the web Update tab instead.
; ============================================================================
[env:esp32-s3-touch-lcd-128-ota]
extends         = env:esp32-s3-touch-lcd-128
upload_protocol = espota
upload_port     = 192.168.4.139   ; device IP; printorb.local also works via mDNS
upload_flags    = --auth=CHANGEME ; set to the device's OTA password
